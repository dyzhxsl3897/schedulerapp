services:
  db:
    image: mysql:8.0
    container_name: scheduler-mysql
    restart: always
    environment:
      MYSQL_DATABASE: scheduler_db
      MYSQL_USER: scheduler
      MYSQL_PASSWORD: scheduler_pass
      MYSQL_ROOT_PASSWORD: root_pass
      TZ: America/New_York
    ports:
      - "3306:3306"
    volumes:
      - scheduler-db:/var/lib/mysql
    networks:
      - app-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "scheduler", "-pscheduler_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: scheduler-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - TZ=America/New_York
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8080/api/google/callback}
      - AI_API_URL=${AI_API_URL:-http://host.docker.internal:11434/v1/chat/completions}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_API_MODEL=${AI_API_MODEL:-qwen2.5:7b-instruct}
      - AI_API_MAX_TOKENS=${AI_API_MAX_TOKENS:-1024}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    container_name: scheduler-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  scheduler-db:
