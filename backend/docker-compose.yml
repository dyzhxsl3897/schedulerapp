version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: scheduler-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: scheduler_db
      MYSQL_USER: scheduler
      MYSQL_PASSWORD: scheduler_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - scheduler-db:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  scheduler-db:
