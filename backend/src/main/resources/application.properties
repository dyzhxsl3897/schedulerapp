spring.application.name=scheduler-backend

# Datasource Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/scheduler_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=scheduler
spring.datasource.password=scheduler_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Database Initialization
spring.sql.init.mode=always

# JWT Configuration
# Use a strong secret key (min 256 bits)
jwt.secret=7S6/8gX+7g4b8h2+7g4b8h2+7g4b8h2+7g4b8h2+7g4b8h2+7g4b8h2+7g4b8h2+
jwt.expirationMs=86400000

# Google Calendar OAuth2
google.calendar.client-id=${GOOGLE_CLIENT_ID:}
google.calendar.client-secret=${GOOGLE_CLIENT_SECRET:}
google.calendar.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/google/callback}

# Logging
logging.level.org.springframework.security=DEBUG
